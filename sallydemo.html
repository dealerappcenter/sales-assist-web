<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW of Schererville - Sally Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
    <!-- Alpine.js for lightweight state management -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="font-sans bg-gray-900 overflow-hidden">
    <div class="min-h-screen relative flex items-center justify-center">
        <!-- Background Image & Overlay -->
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1556189250-72ba954cfc2b?auto=format&fit=crop&q=80&w=2070" alt="BMW Dealership Showroom" class="w-full h-full object-cover opacity-70" />
            <div class="absolute inset-0 bg-gradient-to-br from-black/90 via-black/60 to-black/40 mix-blend-multiply"></div>
        </div>

        <!-- Main Content Container -->
        <div class="relative z-10 w-full max-w-7xl mx-auto px-4 py-12 lg:py-24 grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24 items-center">
            <!-- Left Side: Dealership Branding -->
            <div class="text-white space-y-6 text-center lg:text-left">
                <div class="inline-flex items-center justify-center lg:justify-start gap-3 bg-white/10 backdrop-blur-md px-4 py-2 rounded-full border border-white/20 mb-4">
                    <i data-lucide="car" class="text-blue-400 w-5 h-5"></i>
                    <span class="text-sm font-medium tracking-wider uppercase">Premium Dealership</span>
                </div>
                <h1 class="text-5xl lg:text-7xl font-light tracking-tight">
                    BMW of <br />
                    <span class="font-bold">Schererville</span>
                </h1>
                <p class="text-lg lg:text-xl text-gray-300 font-light max-w-lg mx-auto lg:mx-0 leading-relaxed">
                    Experience the Ultimate Driving Machine. Browse our exclusive inventory of new and pre-owned luxury vehicles.
                </p>
                <div class="pt-8 flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-6 text-sm text-gray-400">
                    <div class="flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                        <span>Schererville, IN</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i data-lucide="phone" class="w-4 h-4"></i>
                        <span>650-385-9777</span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Lead Form -->
            <div class="w-full max-w-md mx-auto lg:max-w-none lg:mx-0" x-data="leadForm()">
                <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 sm:p-10 rounded-3xl shadow-2xl relative overflow-visible">
                    
                    <template x-if="!isSubmitted">
                        <form @submit.prevent="submitForm" class="space-y-5">
                            <!-- Intro Text -->
                            <div class="mb-8">
                                <h2 class="text-2xl font-semibold text-white mb-3">Get in Touch</h2>
                                <p class="text-sm text-gray-300 leading-relaxed">
                                    Welcome to BMW of Schererville! Thank you for your interest. Please fill out the form below and we are excited to get in touch.
                                </p>
                            </div>

                            <template x-if="errorMsg">
                                <div class="bg-red-500/20 border border-red-500/50 text-red-100 px-4 py-3 rounded-lg text-sm flex items-start gap-3">
                                    <i data-lucide="info" class="w-5 h-5 shrink-0 mt-0.5"></i>
                                    <p x-text="errorMsg"></p>
                                </div>
                            </template>

                            <!-- Name Fields -->
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">First Name *</label>
                                    <input type="text" x-model="formData.firstName" class="w-full bg-black/30 border border-white/10 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all placeholder-gray-500" placeholder="John" />
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Last Name *</label>
                                    <input type="text" x-model="formData.lastName" class="w-full bg-black/30 border border-white/10 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all placeholder-gray-500" placeholder="Doe" />
                                </div>
                            </div>

                            <!-- Contact Fields -->
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Mobile Number *</label>
                                    <input type="tel" x-model="formData.mobile" class="w-full bg-black/30 border border-white/10 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all placeholder-gray-500" placeholder="(555) 000-0000" />
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Email Address *</label>
                                    <input type="email" x-model="formData.email" class="w-full bg-black/30 border border-white/10 text-white rounded-xl px-4 py-3.5 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all placeholder-gray-500" placeholder="john@example.com" />
                                </div>
                            </div>

                            <!-- Custom Rich Dropdown: Vehicle of Interest -->
                            <div class="relative z-50" @click.away="dropdownOpen = false">
                                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Vehicle of Interest *</label>
                                <button type="button" @click="dropdownOpen = !dropdownOpen" class="w-full bg-black/30 border border-white/10 text-white rounded-xl px-4 py-3.5 flex items-center justify-between focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all">
                                    <span x-show="formData.vehicle" class="truncate pr-4" x-text="formData.vehicle ? formData.vehicle.name : ''"></span>
                                    <span x-show="!formData.vehicle" class="text-gray-500">Select a vehicle...</span>
                                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-400 transition-transform" :class="dropdownOpen ? 'rotate-180' : ''"></i>
                                </button>

                                <div x-show="dropdownOpen" x-cloak class="absolute top-full left-0 w-full mt-2 bg-white rounded-xl shadow-2xl max-h-[320px] overflow-y-auto border border-gray-200 divide-y divide-gray-100 z-50">
                                    <template x-for="v in vehicles" :key="v.id">
                                        <div @click="selectVehicle(v)" class="flex items-center gap-4 p-3 hover:bg-blue-50 cursor-pointer transition-colors group">
                                            <img :src="v.image" :alt="v.name" class="w-24 h-16 object-cover rounded-md border border-gray-200 group-hover:border-blue-200" />
                                            <div class="flex-1 min-w-0">
                                                <div class="text-sm font-bold text-gray-900 truncate" x-text="v.name"></div>
                                                <div class="text-xs text-gray-500 truncate" x-text="v.details"></div>
                                            </div>
                                            <div class="text-sm font-bold text-gray-900 whitespace-nowrap pl-2" x-text="v.price"></div>
                                        </div>
                                    </template>
                                </div>
                            </div>

                            <!-- Standard Dropdown: Intent -->
                            <div>
                                <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Intent *</label>
                                <div class="relative">
                                    <select x-model="formData.intent" class="w-full bg-black/30 border border-white/10 text-white rounded-xl px-4 py-3.5 appearance-none focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all [&>option]:text-gray-900">
                                        <option value="" disabled class="text-gray-500">What would you like to do?</option>
                                        <option value="Get Price & Confirm Availability">Get Price & Confirm Availability</option>
                                        <option value="Book Test Drive">Book Test Drive</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="w-5 h-5 text-gray-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" class="w-full bg-[#F97316] hover:opacity-90 text-white font-semibold py-4 rounded-xl mt-4 transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-[#F97316]/30">
                                Submit Inquiry
                            </button>
                        </form>
                    </template>

                    <!-- Success State -->
                    <template x-if="isSubmitted">
                        <div class="py-12 text-center animate-in fade-in zoom-in duration-500">
                            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-500/20 text-green-400 mb-6 border border-green-500/30">
                                <i data-lucide="check-circle" class="w-10 h-10"></i>
                            </div>
                            <h2 class="text-3xl font-bold text-white mb-4">Thank You!</h2>
                            <p class="text-gray-300 text-lg leading-relaxed px-4">
                                Thank you for getting in touch, <span class="text-white font-semibold" x-text="formData.firstName"></span>. <br/> We will be in touch shortly regarding the <span class="text-white font-medium" x-text="formData.vehicle.name"></span>.
                            </p>
                            <button @click="resetForm" class="mt-8 text-[#F97316] hover:opacity-80 font-medium text-sm transition-colors">
                                Submit another inquiry
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        document.addEventListener('alpine:init', () => {
            Alpine.data('leadForm', () => ({
                formData: {
                    firstName: '',
                    lastName: '',
                    mobile: '',
                    email: '',
                    vehicle: null,
                    intent: ''
                },
                isSubmitted: false,
                dropdownOpen: false,
                errorMsg: '',
                vehicles: [
                    { id: 1, name: '2024 BMW X5 xDrive40i', details: '2024 | 29,470 mi | Stock: P7210', price: '$53,345', image: 'https://assets.cai-media-management.com/resize/1024x1024/common-vehicle-media/f302cbb0-1486-402f-9556-445c53e4bba8.jpg', payload: { make: "BMW", model: "X5", trim: "xDrive40i", vin: "5UX23EU03R9V93979", year: "2024", stockNumber: "P7210", isPrimary: true } },
                    { id: 2, name: '2023 BMW X3 xDrive30i', details: '2023 | 24,463 mi | Stock: P7264', price: '$37,980', image: 'https://assets.cai-media-management.com/resize/1024x1024/common-vehicle-media/f0ddd09f-a4aa-4e98-a762-6ef33b8be2fd.jpeg', payload: { make: "BMW", model: "X3", trim: "xDrive30i", vin: "5UX53DP06P9S73989", year: "2023", stockNumber: "P7264", isPrimary: true } },
                    { id: 3, name: '2021 BMW X1 sDrive28i', details: '2021 | 103,658 mi | Stock: P7265', price: '$14,980', image: 'https://assets.cai-media-management.com/resize/1024x1024/common-vehicle-media/de47866f-48be-4949-a56d-1d76f2e023a1.jpg', payload: { make: "BMW", id: "2e7b157f-7683-4dcb-8b24-f622e937d973", model: "X1", trim: "sDrive28i", vin: "WBXJG7C04M5S95684", year: "2021", stockNumber: "P7265", isPrimary: true } }
                ],
                selectVehicle(v) {
                    this.formData.vehicle = v;
                    this.dropdownOpen = false;
                    this.errorMsg = '';
                },
                async submitForm() {
                    if (!this.formData.firstName || !this.formData.lastName || !this.formData.mobile || !this.formData.email || !this.formData.vehicle || !this.formData.intent) {
                        this.errorMsg = 'Please fill out all required fields before submitting.';
                        // Re-initialize icons for the new info element
                        setTimeout(() => lucide.createIcons(), 0);
                        return;
                    }

                    let subSource = '';
                    if (this.formData.intent === 'Book Test Drive') {
                        subSource = 'Autoleadstar/ Book Appointment';
                    } else if (this.formData.intent === 'Get Price & Confirm Availability') {
                        subSource = 'Dealer Inspire/Save and Compare';
                    }

                    const submissionData = {
                        title: `${this.formData.firstName} ${this.formData.lastName} — landing page`,
                        description: `Customer intent: ${this.formData.intent} for ${this.formData.vehicle.name}`,
                        source_id: 24863,
                        people: {
                            firstname: this.formData.firstName,
                            lastname: this.formData.lastName,
                            contacts: [
                                { value: this.formData.email, contacts_types_id: 1 },
                                { value: this.formData.mobile, contacts_types_id: 2 }
                            ]
                        },
                        custom_fields: [
                            { name: 'sub_source', value: subSource },
                            { name: 'vehicle_of_interest', value: JSON.stringify(this.formData.vehicle.payload) }
                        ]
                    };

                    try {
                        const response = await fetch('https://graphapi.kanvas.dev/v1/receiver/9004cb8e-df6f-4b3a-bd75-d6788fb6b082', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(submissionData)
                        });
                        
                        if (!response.ok) throw new Error('Network response was not ok');
                        
                        console.log("Sending Lead Data:", submissionData);
                        this.isSubmitted = true;
                        // Re-initialize icons for the success view
                        setTimeout(() => lucide.createIcons(), 0);
                    } catch (error) {
                        console.error('Error submitting form:', error);
                        this.errorMsg = 'There was an error submitting your request. Please try again.';
                        setTimeout(() => lucide.createIcons(), 0);
                    }
                },
                resetForm() {
                    this.isSubmitted = false;
                    this.formData = { firstName: '', lastName: '', mobile: '', email: '', vehicle: null, intent: '' };
                    this.errorMsg = '';
                    setTimeout(() => lucide.createIcons(), 0);
                }
            }))
        })
    </script>
</body>
</html>
